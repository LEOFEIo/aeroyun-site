<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Flyun 智能寻访管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --success: #10b981; 
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --bg-body: #f8fafc;
        }

        body { font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; background: var(--bg-body); padding: 0; margin: 0; }

        /* --- 登录页面 --- */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; 
        }
        .login-box { 
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 20px; 
            width: 360px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- 主界面 --- */
        .container { max-width: 1400px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1.title { color: #0f172a; text-align: center; margin-bottom: 20px; font-weight: 700; }

        .section-title { border-left: 5px solid var(--primary); padding-left: 15px; margin: 25px 0 15px; font-weight: 600; color: #1e293b; display: flex; justify-content: space-between; align-items: center; }
        
        /* 岗位管理小面板 */
        .job-manager { background: #eff6ff; padding: 15px; border-radius: 12px; border: 1px solid #dbeafe; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .job-tag { background: white; padding: 4px 10px; border-radius: 6px; border: 1px solid #bfdbfe; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .job-tag span { cursor: pointer; color: var(--danger); font-weight: bold; }

        /* 表单布局 */
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; background: #f1f5f9; padding: 20px; border-radius: 12px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; color: #475569; margin-bottom: 4px; font-weight: 600; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; outline: none; }
        .form-group input:focus { border-color: var(--primary); }

        .actions { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-excel { background: var(--success); color: white; }
        .btn-logout { background: #94a3b8; color: white; }

        /* 表格样式 */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1800px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .status-fit { background-color: #dcfce7; color: #166534; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
        .status-unfit { background-color: #fee2e2; color: #991b1b; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
        .status-contacting { background-color: #fef9c3; color: #854d0e; font-weight: 600; padding: 3px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Flyun System</h2>
        <p>输入密码以开始寻访</p>
        <input type="password" id="sysPass" placeholder="访问密码" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px; box-sizing:border-box;">
        <button class="btn-add" style="width:100%; padding:12px" onclick="handleLogin()">登 录</button>
    </div>
</div>

<div class="container" id="appBody" style="display:none">
    <h1 class="title">Flyun 候选人寻访看板</h1>

    <div class="section-title">岗位库管理</div>
    <div class="job-manager">
        <input type="text" id="newJobName" placeholder="输入新岗位名称，如：Java开发工程师" style="padding:8px; border-radius:6px; border:1px solid #cbd5e1; width:250px;">
        <button class="btn-add" style="padding:8px 15px;" onclick="addJobToLib()">添加岗位</button>
        <div id="jobTags" style="display:flex; flex-wrap:wrap; gap:8px; margin-left:15px;">
            </div>
    </div>

    <div class="section-title">寻访信息录入</div>
    <div class="form-grid">
        <div class="form-group"><label>1. 推荐公司</label><input type="text" id="recCompany"></div>
        <div class="form-group">
            <label>2. 推荐的岗位名称</label>
            <select id="recJob">
                <option value="">-- 请选择岗位 --</option>
            </select>
        </div>
        <div class="form-group"><label>3. 姓名</label><input type="text" id="name"></div>
        <div class="form-group"><label>4. 性别</label><select id="gender"><option value="男">男</option><option value="女">女</option></select></div>
        
        <div class="form-group">
            <label>5. 状态</label>
            <select id="status">
                <option value="正在联系中">正在联系中</option>
                <option value="合适">合适</option>
                <option value="不合适">不合适</option>
            </select>
        </div>
        <div class="form-group"><label>6. 出生年份</label><input type="text" id="birthYear"></div>
        <div class="form-group"><label>7. 岗位产品</label><input type="text" id="jobProduct"></div>
        <div class="form-group"><label>8. 目前所在地</label><input type="text" id="currLoc"></div>

        <div class="form-group"><label>9. 期望所在地</label><input type="text" id="expLoc"></div>
        <div class="form-group"><label>10. 现公司</label><input type="text" id="currCompany"></div>
        <div class="form-group"><label>11. 电话/微信号</label><input type="text" id="contact"></div>
        <div class="form-group"><label>12. 邮箱</label><input type="text" id="email"></div>

        <div class="form-group"><label>13. 学历</label><input type="text" id="eduLevel"></div>
        <div class="form-group"><label>14. 入学年份</label><input type="text" id="eduInYear"></div>
        <div class="form-group"><label>15. 学校</label><input type="text" id="school"></div>
        <div class="form-group"><label>16. 备注</label><input type="text" id="note"></div>
    </div>

    <div class="actions">
        <button class="btn btn-add" onclick="addRow()">✅ 加入寻访名单</button>
        <button class="btn btn-excel" onclick="exportToExcel()">📊 导出 Excel 表格</button>
        <button class="btn btn-logout" onclick="location.reload()">🔒 退出系统</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>姓名</th><th>状态</th><th>所属岗位</th><th>性别</th><th>出生年</th><th>现公司</th><th>目前所在地</th><th>电话/微信</th><th>学历</th><th>学校</th><th>备注</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const USER_CONFIG = { "123456": "db_v3_admin", "flyun888": "db_v3_staff" };
    let activeKey = "";
    let dataList = [];
    let jobList = []; // 岗位库

    function handleLogin() {
        const p = document.getElementById('sysPass').value;
        if (USER_CONFIG[p]) {
            activeKey = USER_CONFIG[p];
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appBody').style.display = 'block';
            loadData();
        } else { alert("密码错误"); }
    }

    // --- 岗位管理逻辑 ---
    function addJobToLib() {
        const jobName = document.getElementById('newJobName').value.trim();
        if (!jobName) return;
        if (jobList.includes(jobName)) return alert("岗位已存在");
        
        jobList.push(jobName);
        document.getElementById('newJobName').value = "";
        saveJobs();
        renderJobElements();
    }

    function removeJob(name) {
        jobList = jobList.filter(j => j !== name);
        saveJobs();
        renderJobElements();
    }

    function renderJobElements() {
        const tagContainer = document.getElementById('jobTags');
        const select = document.getElementById('recJob');
        
        // 更新岗位标签显示
        tagContainer.innerHTML = jobList.map(j => `
            <div class="job-tag">${j} <span onclick="removeJob('${j}')">×</span></div>
        `).join('');

        // 更新下拉框选项
        const currentVal = select.value;
        select.innerHTML = '<option value="">-- 请选择岗位 --</option>' + 
            jobList.map(j => `<option value="${j}">${j}</option>`).join('');
        select.value = currentVal;
    }

    function saveJobs() {
        localStorage.setItem(activeKey + "_jobs", JSON.stringify(jobList));
    }

    // --- 数据存取逻辑 ---
    function loadData() {
        // 加载候选人
        const s = localStorage.getItem(activeKey);
        if (s) dataList = JSON.parse(s);
        
        // 加载岗位库
        const j = localStorage.getItem(activeKey + "_jobs");
        if (j) jobList = JSON.parse(j);
        
        renderJobElements();
        renderTable();
    }

    function addRow() {
        const row = {
            id: Date.now(),
            recCompany: document.getElementById('recCompany').value,
            recJob: document.getElementById('recJob').value,
            name: document.getElementById('name').value,
            gender: document.getElementById('gender').value,
            status: document.getElementById('status').value,
            birthYear: document.getElementById('birthYear').value,
            jobProduct: document.getElementById('jobProduct').value,
            currLoc: document.getElementById('currLoc').value,
            expLoc: document.getElementById('expLoc').value,
            currCompany: document.getElementById('currCompany').value,
            contact: document.getElementById('contact').value,
            email: document.getElementById('email').value,
            eduLevel: document.getElementById('eduLevel').value,
            eduInYear: document.getElementById('eduInYear').value,
            school: document.getElementById('school').value,
            note: document.getElementById('note').value
        };

        if (!row.name || !row.recJob) return alert("姓名和推荐岗位是必填项");
        dataList.push(row);
        localStorage.setItem(activeKey, JSON.stringify(dataList));
        renderTable();
        alert("录入成功！");
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        dataList.forEach(item => {
            const tr = document.createElement("tr");
            let sCls = item.status === "合适" ? "status-fit" : (item.status === "不合适" ? "status-unfit" : "status-contacting");
            tr.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td><span class="${sCls}">${item.status}</span></td>
                <td>${item.recJob}</td>
                <td>${item.gender}</td>
                <td>${item.birthYear}</td>
                <td>${item.currCompany}</td>
                <td>${item.currLoc}</td>
                <td>${item.contact}</td>
                <td>${item.eduLevel}</td>
                <td>${item.school}</td>
                <td>${item.note}</td>
                <td><button onclick="del(${item.id})" style="color:red; border:none; background:none; cursor:pointer">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function del(id) {
        if(confirm("确定删除？")) {
            dataList = dataList.filter(i => i.id !== id);
            localStorage.setItem(activeKey, JSON.stringify(dataList));
            renderTable();
        }
    }

    function exportToExcel() {
        const header = ["推荐公司", "推荐岗位名称", "姓名", "性别", "状态", "出生年份", "岗位产品", "目前所在地", "期望所在地", "现公司", "电话/微信号", "邮箱", "学历", "入学年份", "学校", "备注"];
        const rows = dataList.map(i => [i.recCompany, i.recJob, i.name, i.gender, i.status, i.birthYear, i.jobProduct, i.currLoc, i.expLoc, i.currCompany, i.contact, i.email, i.eduLevel, i.eduInYear, i.school, i.note]);
        const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "数据导出");
        XLSX.writeFile(wb, `寻访报告_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
</body>
</html>
