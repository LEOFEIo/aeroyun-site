<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Flyun 猎头寻访智能看板 - 集成全网搜人</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --warning: #faad14; --danger: #ff4d4f; }
        body { font-family: 'PingFang SC', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 登录与布局 */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: white; padding: 30px; border-radius: 10px; text-align: center; }

        /* 功能区域划分 */
        .section-title { border-left: 4px solid var(--primary); padding-left: 10px; margin: 20px 0; font-weight: bold; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; background: #fafafa; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        
        /* 搜人插件区域 */
        .search-helper { background: #eef7ff; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .search-btn { background: #55acee; color: white; padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-size: 13px; text-decoration: none; }
        
        /* 表格样式 */
        .status-fit { background-color: #e6ffed !important; color: var(--success); }
        .status-unfit { background-color: #fff1f0 !important; color: var(--danger); }
        .status-contacting { background-color: #fffbe6 !important; color: var(--warning); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #e8e8e8; padding: 12px; text-align: left; font-size: 13px; }
        th { background: #f5f5f5; }
        
        .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; transition: 0.3s; }
        .btn-add { background: var(--primary); }
        .btn-excel { background: var(--success); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>Flyun 内部寻访系统</h3>
        <input type="password" id="sysPass" placeholder="请输入操作密码" style="width:100%; padding:10px; margin:15px 0;">
        <button class="btn btn-add" style="width:100%" onclick="handleLogin()">进入系统</button>
    </div>
</div>

<div class="container" id="appBody" style="display:none">
    <h2>Flyun 候选人寻访看板</h2>

    <div class="section-title">全网人才快速定位 (快捷搜索)</div>
    <div class="search-helper">
        <input type="text" id="targetInfo" placeholder="输入候选人姓名 或 公司+职位" style="flex:1; padding:10px; border:1px solid #ddd;">
        <button onclick="quickSearch('boss')" class="search-btn">BOSS直聘搜索</button>
        <button onclick="quickSearch('liepin')" class="search-btn">猎聘搜索</button>
        <button onclick="quickSearch('linkedin')" class="search-btn" style="background:#0077b5">LinkedIn搜索</button>
    </div>

    <div class="section-title">寻访名单录入</div>
    <div class="form-grid">
        <div style="display:flex; flex-direction:column;"><label>推荐公司</label><input type="text" id="recCompany"></div>
        <div style="display:flex; flex-direction:column;"><label>姓名</label><input type="text" id="name"></div>
        <div style="display:flex; flex-direction:column;">
            <label>状态</label>
            <select id="status">
                <option value="正在联系中">正在联系中</option>
                <option value="合适">合适</option>
                <option value="不合适">不合适</option>
            </select>
        </div>
        <div style="display:flex; flex-direction:column;"><label>现公司</label><input type="text" id="currCompany"></div>
        <div style="display:flex; flex-direction:column;"><label>电话/微信</label><input type="text" id="contact"></div>
        <div style="display:flex; flex-direction:column;"><label>学校</label><input type="text" id="school"></div>
        <div style="display:flex; flex-direction:column;"><label>备注</label><input type="text" id="note"></div>
    </div>

    <div style="text-align:center; margin: 20px 0;">
        <button class="btn btn-add" onclick="addRow()">加入寻访名单</button>
        <button class="btn btn-excel" onclick="exportToExcel()">导出 Excel 表格</button>
        <button class="btn" style="background:#888" onclick="location.reload()">安全退出</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>姓名</th><th>状态</th><th>推荐公司</th><th>现公司</th><th>电话/微信</th><th>学校</th><th>备注</th><th>操作</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const USER_CONFIG = { "123456": "flyun_admin", "flyun888": "flyun_staff" };
    let activeKey = "";
    let dataList = [];

    // 功能 1: 登录与持久化
    function handleLogin() {
        const pass = document.getElementById('sysPass').value;
        if (USER_CONFIG[pass]) {
            activeKey = USER_CONFIG[pass];
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appBody').style.display = 'block';
            loadData();
        } else { alert("密码错误"); }
    }

    function loadData() {
        const saved = localStorage.getItem(activeKey);
        if (saved) { dataList = JSON.parse(saved); renderTable(); }
    }

    // 功能 2: 模拟爬虫搜索逻辑 (通过 URL 参数跳转)
    function quickSearch(platform) {
        const kw = document.getElementById('targetInfo').value;
        if (!kw) { alert("请先输入要搜索的人名或公司职位关键词"); return; }
        
        const urls = {
            'boss': `https://www.zhipin.com/web/geek/resume?query=${encodeURIComponent(kw)}`,
            'liepin': `https://www.liepin.com/zhaopin/?key=${encodeURIComponent(kw)}`,
            'linkedin': `https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(kw)}`
        };
        window.open(urls[platform], '_blank');
    }

    // 功能 3: 录入
    function addRow() {
        const row = {
            id: Date.now(),
            name: document.getElementById('name').value,
            status: document.getElementById('status').value,
            recCompany: document.getElementById('recCompany').value,
            currCompany: document.getElementById('currCompany').value,
            contact: document.getElementById('contact').value,
            school: document.getElementById('school').value,
            note: document.getElementById('note').value
        };
        if (!row.name) return alert("姓名必填");
        dataList.push(row);
        localStorage.setItem(activeKey, JSON.stringify(dataList));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        dataList.forEach(item => {
            const tr = document.createElement("tr");
            let cls = item.status === "合适" ? "status-fit" : (item.status === "不合适" ? "status-unfit" : "status-contacting");
            tr.innerHTML = `
                <td>${item.name}</td><td class="${cls}">${item.status}</td>
                <td>${item.recCompany}</td><td>${item.currCompany}</td>
                <td>${item.contact}</td><td>${item.school}</td><td>${item.note}</td>
                <td><button onclick="del(${item.id})">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function del(id) {
        dataList = dataList.filter(i => i.id !== id);
        localStorage.setItem(activeKey, JSON.stringify(dataList));
        renderTable();
    }

    // 功能 4: 导出 Excel
    function exportToExcel() {
        const ws = XLSX.utils.json_to_sheet(dataList);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "寻访结果");
        XLSX.writeFile(wb, "Flyun寻访报告.xlsx");
    }
</script>
</body>
</html>
