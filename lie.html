<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLY YUN - 智能寻访管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-card: rgba(255, 255, 255, 0.85);
            --ios-text: #000000;
            --ios-secondary-text: #8E8E93;
            --radius: 20px;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; 
            background-color: var(--ios-bg); 
            color: var(--ios-text);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- iOS 风格登录页面 --- */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #D1D1D6 0%, #F2F2F7 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .login-card {
            background: var(--ios-card);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 40px;
            border-radius: 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .login-card h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        .login-card p { font-size: 13px; color: var(--ios-secondary-text); margin-bottom: 30px; }

        .ios-input {
            width: 100%; padding: 16px; border-radius: 14px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.5); font-size: 16px; outline: none;
            box-sizing: border-box; transition: 0.2s; text-align: center;
        }

        .ios-btn-main {
            width: 100%; background: var(--ios-blue); color: white; padding: 16px;
            border: none; border-radius: 14px; font-size: 16px; font-weight: 600;
            margin-top: 20px; cursor: pointer; transition: all 0.2s;
        }
        .ios-btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* --- 主界面布局 --- */
        .app-container { max-width: 1300px; margin: 0 auto; padding: 40px 20px; }
        header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        header h2 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .user-tag { background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 20px; font-size: 12px; color: var(--ios-secondary-text); }

        .ios-card {
            background: var(--ios-card);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; opacity: 0.8; }

        /* 岗位库 */
        .job-pill-box { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
        .job-pill { 
            background: white; padding: 8px 16px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px;
        }
        .job-pill span { cursor: pointer; color: #FF3B30; }

        /* 网格布局 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
        .field-group { display: flex; flex-direction: column; }
        .field-group label { font-size: 12px; font-weight: 600; color: var(--ios-secondary-text); margin-bottom: 6px; padding-left: 4px; }
        
        .grid input, .grid select {
            background: white; border: 1px solid #D1D1D6; padding: 12px; border-radius: 12px; font-size: 14px; outline: none; transition: 0.2s;
        }
        .grid input:focus, .grid select:focus { border-color: var(--ios-blue); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }

        /* 操作按钮 */
        .actions-bar { display: flex; justify-content: center; gap: 16px; margin: 40px 0; }
        .ios-btn { padding: 14px 28px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-green { background: #34C759; color: white; }
        .btn-gray { background: #E5E5EA; color: #3A3A3C; }

        /* 表格设计 */
        .table-wrap { overflow-x: auto; border-radius: var(--radius); background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1800px; }
        th { text-align: left; padding: 18px 12px; font-size: 12px; color: var(--ios-secondary-text); border-bottom: 1px solid #F2F2F7; font-weight: 600; }
        td { padding: 16px 12px; font-size: 14px; border-bottom: 1px solid #F2F2F7; }
        
        .status-badge { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .status-合适 { background: #D2F9D8; color: #1E6726; }
        .status-不合适 { background: #FFE5E5; color: #D32F2F; }
        .status-正在联系中 { background: #FFF4D2; color: #8A6D1F; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-card">
        <h1>FLY YUN</h1>
        <p>输入您的专属访问密码<br><span style="font-size: 11px; opacity: 0.7;">(不同密码对应独立存储空间)</span></p>
        <input type="password" id="customPass" class="ios-input" placeholder="访问密码" onkeydown="if(event.keyCode==13) startApp()">
        <button class="ios-btn-main" onclick="startApp()">进入系统</button>
    </div>
</div>

<div class="app-container" id="appBody" style="display:none">
    <header>
        <h2>FLY YUN</h2>
        <div class="user-tag" id="userDisplay"></div>
    </header>

    <div class="ios-card">
        <div class="section-title">岗位库管理</div>
        <div style="display:flex; gap:12px;">
            <input type="text" id="jobInput" class="ios-input" style="max-width:300px; text-align: left; background: white;" placeholder="新增岗位...">
            <button class="ios-btn btn-blue" style="padding: 10px 24px; border-radius: 12px;" onclick="saveNewJob()">添加</button>
        </div>
        <div class="job-pill-box" id="jobContainer"></div>
    </div>

    <div class="ios-card">
        <div class="section-title">寻访详情录入</div>
        <div class="grid">
            <div class="field-group"><label>1. 推荐公司</label><input type="text" id="f1"></div>
            <div class="field-group"><label>2. 岗位名称</label><select id="f2"><option value="">请选择...</option></select></div>
            <div class="field-group"><label>3. 姓名</label><input type="text" id="f3"></div>
            <div class="field-group"><label>4. 性别</label><select id="f4"><option value="男">男</option><option value="女">女</option></select></div>
            <div class="field-group"><label>5. 状态</label><select id="f5"><option value="正在联系中">正在联系中</option><option value="合适">合适</option><option value="不合适">不合适</option></select></div>
            
            <div class="field-group">
                <label>6. 出生年份</label>
                <select id="f6"></select>
            </div>
            
            <div class="field-group"><label>7. 岗位产品</label><input type="text" id="f7"></div>
            <div class="field-group"><label>8. 目前所在地</label><input type="text" id="f8"></div>
            <div class="field-group"><label>9. 期望所在地</label><input type="text" id="f9"></div>
            <div class="field-group"><label>10. 现公司</label><input type="text" id="f10"></div>
            <div class="field-group"><label>11. 电话/微信号</label><input type="text" id="f11"></div>
            <div class="field-group"><label>12. 邮箱</label><input type="text" id="f12"></div>
            
            <div class="field-group">
                <label>13. 学历</label>
                <select id="f13">
                    <option value="本科">本科</option>
                    <option value="研究生">研究生</option>
                    <option value="博士">博士</option>
                </select>
            </div>
            
            <div class="field-group"><label>14. 入学年份</label><input type="text" id="f14"></div>
            <div class="field-group"><label>15. 学校</label><input type="text" id="f15"></div>
            <div class="field-group"><label>16. 备注</label><input type="text" id="f16"></div>
        </div>
    </div>

    <div class="actions-bar">
        <button class="ios-btn btn-blue" onclick="submitData()">✅ 存入名单</button>
        <button class="ios-btn btn-green" onclick="exportExcel()">📊 导出 Excel (带样式)</button>
        <button class="ios-btn btn-gray" onclick="location.reload()">🔒 退出登录</button>
    </div>

    <div class="ios-card" style="padding:0; overflow:hidden;">
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>姓名</th><th>状态</th><th>岗位</th><th>性别</th><th>出生年</th><th>所在地</th><th>现公司</th><th>联系方式</th><th>学历</th><th>学校</th><th>备注</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let storageKey = ""; 
    let candidates = [];
    let jobs = [];

    // 初始化年份下拉
    function initYearDropdown() {
        const yearSelect = document.getElementById('f6');
        let options = '<option value="">请选择...</option>';
        for (let y = 1960; y <= 2022; y++) {
            options += `<option value="${y}">${y}年</option>`;
        }
        yearSelect.innerHTML = options;
    }

    function startApp() {
        const pass = document.getElementById('customPass').value;
        if (!pass) return alert("请输入密码");
        storageKey = "FLY_YUN_V5_" + btoa(pass);
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appBody').style.display = 'block';
        document.getElementById('userDisplay').innerText = "当前空间: " + pass;
        initYearDropdown();
        loadAllData();
    }

    function loadAllData() {
        const c = localStorage.getItem(storageKey);
        candidates = c ? JSON.parse(c) : [];
        const j = localStorage.getItem(storageKey + "_jobs");
        jobs = j ? JSON.parse(j) : [];
        updateJobUI();
        updateTableUI();
    }

    function saveNewJob() {
        const name = document.getElementById('jobInput').value.trim();
        if (name && !jobs.includes(name)) {
            jobs.push(name);
            localStorage.setItem(storageKey + "_jobs", JSON.stringify(jobs));
            document.getElementById('jobInput').value = "";
            updateJobUI();
        }
    }

    function removeJob(name) {
        jobs = jobs.filter(j => j !== name);
        localStorage.setItem(storageKey + "_jobs", JSON.stringify(jobs));
        updateJobUI();
    }

    function updateJobUI() {
        const box = document.getElementById('jobContainer');
        const sel = document.getElementById('f2');
        box.innerHTML = jobs.map(j => `<div class="job-pill">${j} <span onclick="removeJob('${j}')">×</span></div>`).join('');
        const cur = sel.value;
        sel.innerHTML = '<option value="">请选择...</option>' + jobs.map(j => `<option value="${j}">${j}</option>`).join('');
        sel.value = cur;
    }

    function submitData() {
        const row = {
            id: Date.now(),
            f1: document.getElementById('f1').value, f2: document.getElementById('f2').value,
            f3: document.getElementById('f3').value, f4: document.getElementById('f4').value,
            f5: document.getElementById('f5').value, f6: document.getElementById('f6').value,
            f7: document.getElementById('f7').value, f8: document.getElementById('f8').value,
            f9: document.getElementById('f9').value, f10: document.getElementById('f10').value,
            f11: document.getElementById('f11').value, f12: document.getElementById('f12').value,
            f13: document.getElementById('f13').value, f14: document.getElementById('f14').value,
            f15: document.getElementById('f15').value, f16: document.getElementById('f16').value
        };
        if (!row.f3 || !row.f2) return alert("姓名与岗位是必填项");
        candidates.push(row);
        localStorage.setItem(storageKey, JSON.stringify(candidates));
        updateTableUI();
        alert("已保存");
    }

    function updateTableUI() {
        const b = document.getElementById('tableBody');
        b.innerHTML = candidates.map(i => `
            <tr>
                <td><strong>${i.f3}</strong></td>
                <td><span class="status-badge status-${i.f5}">${i.f5}</span></td>
                <td>${i.f2}</td><td>${i.f4}</td><td>${i.f6}</td>
                <td>${i.f8}</td><td>${i.f10}</td><td>${i.f11}</td>
                <td>${i.f13}</td><td>${i.f15}</td><td>${i.f16}</td>
                <td><span style="color:#FF3B30;cursor:pointer" onclick="deleteRecord(${i.id})">移除</span></td>
            </tr>
        `).join('');
    }

    function deleteRecord(id) {
        if(confirm("确定移除？")) {
            candidates = candidates.filter(c => c.id !== id);
            localStorage.setItem(storageKey, JSON.stringify(candidates));
            updateTableUI();
        }
    }

    // --- 导出逻辑 (带样式) ---
    function exportExcel() {
        if(candidates.length === 0) return alert("暂无数据");
        
        const headers = ["推荐公司", "岗位名称", "姓名", "性别", "状态", "出生年", "岗位产品", "目前所在地", "期望所在地", "现公司", "电话/微信", "邮箱", "学历", "入学年份", "学校", "备注"];
        
        // 样式配置：第一行加蓝
        const headerStyle = {
            fill: { fgColor: { rgb: "4F81BD" } }, // 蓝色背景
            font: { color: { rgb: "FFFFFF" }, bold: true }, // 白色粗体
            alignment: { horizontal: "center" }
        };

        // 构建数据
        const data = [
            headers.map(h => ({ v: h, s: headerStyle })), // 第一行
            ...candidates.map(i => [i.f1, i.f2, i.f3, i.f4, i.f5, i.f6, i.f7, i.f8, i.f9, i.f10, i.f11, i.f12, i.f13, i.f14, i.f15, i.f16])
        ];

        const ws = XLSX.utils.aoa_to_sheet(data);
        
        // 设置列宽
        ws['!cols'] = new Array(headers.length).fill({ wch: 15 });

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "寻访报告");
        
        XLSX.writeFile(wb, `FLY_YUN_寻访表_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
</body>
</html>
