<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Flyun 猎头寻访管理系统 - Excel导出增强版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        
        /* 登录遮罩 */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        /* 表单区域 - 严格对应 7 个功能框 */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* 状态颜色 */
        .status-fit { background-color: #e6ffed !important; color: #28a745; font-weight: bold; }
        .status-unfit { background-color: #fff1f0 !important; color: #f5222d; font-weight: bold; }
        .status-contacting { background-color: #fffbe6 !important; color: #faad14; font-weight: bold; }

        .actions { display: flex; gap: 15px; justify-content: center; margin: 25px 0; }
        .btn { padding: 10px 30px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-add { background: #007bff; }
        .btn-export { background: #28a745; }
        .btn-delete { background: #ff4d4f; padding: 4px 8px; font-size: 12px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th, td { border: 1px solid #e8e8e8; padding: 12px 10px; text-align: left; font-size: 13px; }
        th { background: #fafafa; color: #333; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3 style="margin-top:0">Flyun 系统登录</h3>
        <input type="password" id="sysPass" placeholder="请输入操作密码">
        <button class="btn btn-add" style="width:100%" onclick="handleLogin()">进入系统</button>
        <p id="errorTip" style="color:red; font-size:12px; display:none">密码错误！</p>
    </div>
</div>

<div class="container" id="appBody" style="display:none">
    <h2>Flyun 候选人寻访看板</h2>
    
    <div class="form-grid">
        <div class="form-group"><label>推荐公司</label><input type="text" id="recCompany"></div>
        <div class="form-group"><label>姓名</label><input type="text" id="name"></div>
        <div class="form-group">
            <label>状态</label>
            <select id="status">
                <option value="合适">合适</option>
                <option value="不合适">不合适</option>
                <option value="正在联系中">正在联系中</option>
            </select>
        </div>
        <div class="form-group"><label>现公司</label><input type="text" id="currCompany"></div>
        <div class="form-group"><label>电话/微信</label><input type="text" id="contact"></div>
        <div class="form-group"><label>学校</label><input type="text" id="school"></div>
        <div class="form-group"><label>备注</label><input type="text" id="note"></div>
    </div>

    <div class="actions">
        <button class="btn btn-add" onclick="addRow()">加入寻访名单</button>
        <button class="btn btn-export" onclick="exportToExcel()">导出真正的 Excel 文件</button>
        <button class="btn" style="background:#888" onclick="location.reload()">安全退出</button>
    </div>

    <div class="table-container">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>姓名</th><th>状态</th><th>推荐公司</th><th>现公司</th><th>电话/微信</th><th>学校</th><th>备注</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const USER_CONFIG = {
        "123456": "flyun_admin_data",
        "flyun888": "flyun_staff_data"
    };

    let activeKey = "";
    let dataList = [];

    // 1. 登录并加载本地数据
    function handleLogin() {
        const pass = document.getElementById('sysPass').value;
        if (USER_CONFIG[pass]) {
            activeKey = USER_CONFIG[pass];
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('appBody').style.display = 'block';
            const localData = localStorage.getItem(activeKey);
            if (localData) {
                dataList = JSON.parse(localData);
                renderTable();
            }
        } else {
            document.getElementById('errorTip').style.display = 'block';
        }
    }

    // 2. 加入名单并保存
    function addRow() {
        const row = {
            id: Date.now(),
            name: document.getElementById('name').value.trim(),
            status: document.getElementById('status').value,
            recCompany: document.getElementById('recCompany').value.trim(),
            currCompany: document.getElementById('currCompany').value.trim(),
            contact: document.getElementById('contact').value.trim(),
            school: document.getElementById('school').value.trim(),
            note: document.getElementById('note').value.trim()
        };

        if (!row.name) { alert("姓名是必填项！"); return; }

        dataList.push(row);
        localStorage.setItem(activeKey, JSON.stringify(dataList));
        renderTable();
        
        // 清空关键框
        document.getElementById('name').value = '';
        document.getElementById('contact').value = '';
    }

    // 3. 渲染预览表
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        dataList.forEach(item => {
            const tr = document.createElement("tr");
            let statusClass = item.status === "合适" ? "status-fit" : 
                              (item.status === "不合适" ? "status-unfit" : "status-contacting");

            tr.innerHTML = `
                <td>${item.name}</td>
                <td class="${statusClass}">${item.status}</td>
                <td>${item.recCompany}</td>
                <td>${item.currCompany}</td>
                <td>${item.contact}</td>
                <td>${item.school}</td>
                <td>${item.note}</td>
                <td><button class="btn btn-delete" onclick="deleteRow(${item.id})">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteRow(id) {
        if (confirm('确认删除？')) {
            dataList = dataList.filter(i => i.id !== id);
            localStorage.setItem(activeKey, JSON.stringify(dataList));
            renderTable();
        }
    }

    // 4. 核心功能：导出为标准的 .xlsx 表格
    function exportToExcel() {
        if (dataList.length === 0) { alert("没有数据可供导出"); return; }

        // 准备 Excel 数据头
        const worksheetData = [
            ["姓名", "状态", "推荐公司", "现公司", "电话/微信", "学校", "备注"]
        ];

        // 填充内容
        dataList.forEach(item => {
            worksheetData.push([
                item.name, item.status, item.recCompany, 
                item.currCompany, item.contact, item.school, item.note
            ]);
        });

        // 创建工作簿
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(worksheetData);

        // 将工作表放入工作簿
        XLSX.utils.book_append_sheet(wb, ws, "寻访名单");

        // 生成并下载文件
        const fileName = `Flyun寻访报告_${new Date().toLocaleDateString()}.xlsx`;
        XLSX.writeFile(wb, fileName);
    }
</script>

</body>
</html>
