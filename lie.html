<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Flyun 猎头寻访管理系统 - 专业版</title>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f4f7f9; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; margin-bottom: 25px; }
        
        /* 登录遮罩层 */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; }
        .login-box input { width: 100%; padding: 10px; margin: 15px 0; box-sizing: border-box; }

        /* 表单区域 */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; color: #666; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        
        /* 状态颜色 */
        .status-fit { background-color: #e6ffed; color: #28a745; font-weight: bold; }
        .status-unfit { background-color: #fff1f0; color: #f5222d; font-weight: bold; }
        .status-contacting { background-color: #fffbe6; color: #faad14; font-weight: bold; }

        /* 按钮 */
        .actions { display: flex; gap: 15px; justify-content: center; margin: 25px 0; }
        .btn { padding: 10px 30px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .btn-add { background: #007bff; }
        .btn-export { background: #28a745; }
        .btn-logout { background: #666; }
        .btn-delete { background: #ff4d4f; padding: 4px 8px; font-size: 12px; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        /* 表格 */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 1000px; }
        th, td { border: 1px solid #e8e8e8; padding: 12px 10px; text-align: left; font-size: 13px; }
        th { background: #fafafa; color: #333; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h3>系统登录</h3>
        <p style="font-size: 12px; color: #888;">请输入您的专属访问密码</p>
        <input type="password" id="passInput" placeholder="请输入密码" onkeydown="if(event.keyCode==13) login()">
        <button class="btn btn-add" style="width: 100%" onclick="login()">进入系统</button>
        <p id="loginMsg" style="color: red; font-size: 12px; margin-top: 10px;"></p>
    </div>
</div>

<div class="container" id="mainContent" style="display: none;">
    <h2>Flyun 候选人寻访看板</h2>
    
    <div class="form-grid">
        <div class="form-group"><label>推荐公司</label><input type="text" id="recCompany"></div>
        <div class="form-group"><label>姓名</label><input type="text" id="name"></div>
        <div class="form-group">
            <label>状态</label>
            <select id="status">
                <option value="合适">合适</option>
                <option value="不合适">不合适</option>
                <option value="正在联系中">正在联系中</option>
            </select>
        </div>
        <div class="form-group"><label>现公司</label><input type="text" id="currCompany"></div>
        <div class="form-group"><label>电话/微信</label><input type="text" id="contact"></div>
        <div class="form-group"><label>学校</label><input type="text" id="school"></div>
        <div class="form-group"><label>备注</label><input type="text" id="note"></div>
    </div>

    <div class="actions">
        <button class="btn btn-add" onclick="addRow()">加入寻访名单</button>
        <button class="btn btn-export" onclick="exportCSV()">导出 Excel 表格</button>
        <button class="btn btn-logout" onclick="logout()">安全退出</button>
    </div>

    <div class="table-container">
        <table id="myTable">
            <thead>
                <tr>
                    <th>姓名</th><th>状态</th><th>推荐公司</th><th>现公司</th><th>电话/微信</th><th>学校</th><th>备注</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // --- 用户配置区 ---
    // 您可以在这里设置不同的用户及其密码
    const USERS = {
        "admin": "123456",
        "flyun01": "flyun888",
        "guest": "666666"
    };

    let currentUser = "";
    let dataList = [];

    // --- 登录逻辑 ---
    function login() {
        const pass = document.getElementById('passInput').value;
        let foundUser = "";

        for (let user in USERS) {
            if (USERS[user] === pass) {
                foundUser = user;
                break;
            }
        }

        if (foundUser) {
            currentUser = foundUser;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadData(); // 登录成功后加载该用户的数据
        } else {
            document.getElementById('loginMsg').innerText = "密码错误，请重试";
        }
    }

    function logout() {
        location.reload(); // 简单处理，刷新即退出
    }

    // --- 数据持久化逻辑 ---
    // 加载数据：根据当前用户名从 LocalStorage 获取
    function loadData() {
        const savedData = localStorage.getItem('flyun_data_' + currentUser);
        if (savedData) {
            dataList = JSON.parse(savedData);
        } else {
            dataList = [];
        }
        renderTable();
    }

    // 保存数据：每次增删操作后调用
    function saveData() {
        localStorage.setItem('flyun_data_' + currentUser, JSON.stringify(dataList));
    }

    // --- 表格操作逻辑 ---
    function addRow() {
        const row = {
            id: Date.now(),
            name: document.getElementById('name').value,
            status: document.getElementById('status').value,
            recCompany: document.getElementById('recCompany').value,
            currCompany: document.getElementById('currCompany').value,
            contact: document.getElementById('contact').value,
            school: document.getElementById('school').value,
            note: document.getElementById('note').value
        };

        if(!row.name) { alert("姓名是必填项"); return; }

        dataList.push(row);
        saveData(); // 保存到本地
        renderTable();
        
        document.getElementById('name').value = '';
        document.getElementById('contact').value = '';
    }

    function deleteRow(id) {
        if(confirm('确定要删除这条记录吗？')) {
            dataList = dataList.filter(item => item.id !== id);
            saveData(); // 保存修改
            renderTable();
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        dataList.forEach(item => {
            const tr = document.createElement("tr");
            let statusClass = "";
            if (item.status === "合适") statusClass = "status-fit";
            else if (item.status === "不合适") statusClass = "status-unfit";
            else if (item.status === "正在联系中") statusClass = "status-contacting";

            tr.innerHTML = `
                <td>${item.name}</td>
                <td class="${statusClass}">${item.status}</td>
                <td>${item.recCompany}</td>
                <td>${item.currCompany}</td>
                <td>${item.contact}</td>
                <td>${item.school}</td>
                <td>${item.note}</td>
                <td><button class="btn btn-delete" onclick="deleteRow(${item.id})">删除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function exportCSV() {
        if (dataList.length === 0) { alert("暂无数据可导出"); return; }
        let csvContent = "\ufeff"; 
        const headers = ["姓名", "状态", "推荐公司", "现公司", "电话/微信", "学校", "备注"];
        csvContent += headers.join(",") + "\n";
        
        dataList.forEach(item => {
            const row = [item.name, item.status, item.recCompany, item.currCompany, item.contact, item.school, item.note]
                        .map(v => `"${(v||"").replace(/"/g, '""')}"`);
            csvContent += row.join(",") + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `寻访报告_${currentUser}_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }
</script>

</body>
</html>
