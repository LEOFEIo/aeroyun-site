<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Flyun 智能寻访管理系统</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --success: #10b981; 
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --bg-body: #f8fafc;
        }

        body { font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; background: var(--bg-body); padding: 0; margin: 0; }

        /* --- 登录页面美化 --- */
        #loginOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 9999; 
            transition: all 0.5s ease;
        }

        .login-box { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            width: 360px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box h2 { color: #1e293b; margin-bottom: 10px; font-size: 24px; font-weight: 800; }
        .login-box p { color: #64748b; font-size: 14px; margin-bottom: 30px; }

        .login-input-group { position: relative; margin-bottom: 20px; }
        .login-box input { 
            width: 100%; padding: 12px 15px; border: 1.5px solid #e2e8f0; border-radius: 10px; 
            font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .login-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-login { 
            width: 100%; background: var(--primary); color: white; padding: 12px; 
            border: none; border-radius: 10px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: 0.3s; 
        }
        .btn-login:hover { background: var(--primary-hover); transform: translateY(-1px); }

        /* --- 主界面样式 --- */
        .container { max-width: 1400px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1.title { color: #0f172a; text-align: center; margin-bottom: 40px; font-weight: 700; }

        .section-title { border-left: 5px solid var(--primary); padding-left: 15px; margin: 30px 0 15px; font-weight: 600; color: #1e293b; }
        
        .form-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; 
            background: #f1f5f9; padding: 25px; border-radius: 12px; 
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; color: #475569; margin-bottom: 6px; font-weight: 600; }
        .form-group input, .form-group select { 
            padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; 
        }

        .actions { display: flex; justify-content: center; gap: 15px; margin: 40px 0; }
        .btn { padding: 12px 25px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; }
        .btn-add { background: var(--primary); color: white; }
        .btn-excel { background: var(--success); color: white; }
        .btn-logout { background: #94a3b8; color: white; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* 表格样式 */
        .table-container { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1800px; }
        th { background: #f8fafc; padding: 15px 12px; text-align: left; font-size: 13px; color: #64748b; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #1e293b; }
        
        .status-fit { background-color: #dcfce7 !important; color: #166534; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
        .status-unfit { background-color: #fee2e2 !important; color: #991b1b; font-weight: 600; padding: 4px 8px; border-radius: 6px; }
        .status-contacting { background-color: #fef9c3 !important; color: #854d0e; font-weight: 600; padding: 4px 8px; border-radius: 6px; }

        .del-link { color: var(--danger); cursor: pointer; text-decoration: underline; font-size: 12px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Flyun System</h2>
        <p>猎头寻访智能管理平台</p>
        <div class="login-input-group">
            <input type="password" id="sysPass" placeholder="请输入访问密码" onkeydown="if(event.keyCode==13) handleLogin()">
        </div>
        <button class="btn-login" onclick="handleLogin()">登 录 系统</button>
        <div id="loginError" style="color:red; font-size:12px; margin-top:15px; display:none;">密码错误，请重新输入</div>
    </div>
</div>

<div class="container" id="appBody" style="display:none">
    <h1 class="title">候选人寻访看板</h1>

    <div class="section-title">寻访信息录入 (严格16个环节)</div>
    <div class="form-grid">
        <div class="form-group"><label>1. 推荐公司</label><input type="text" id="recCompany"></div>
        <div class="form-group"><label>2. 推荐的岗位名称</label><input type="text" id="recJob"></div>
        <div class="form-group"><label>3. 姓名</label><input type="text" id="name"></div>
        <div class="form-group"><label>4. 性别</label><select id="gender"><option value="男">男</option><option value="女">女</option></select></div>
        
        <div class="form-group">
            <label>5. 状态</label>
            <select id="status">
                <option value="正在联系中">正在联系中</option>
                <option value="合适">合适</option>
                <option value="不合适">不合适</option>
            </select>
        </div>
        <div class="form-group"><label>6. 出生年份</label><input type="text" id="birthYear" placeholder="如 1990"></div>
        <div class="form-group"><label>7. 岗位产品</label><input type="text" id="jobProduct"></div>
        <div class="form-group"><label>8. 目前所在地</label><input type="text" id="currLoc"></div>

        <div class="form-group"><label>9. 期望所在地</label><input type="text" id="expLoc"></div>
        <div class="form-group"><label>10. 现公司</label><input type="text" id="currCompany"></div>
        <div class="form-group"><label>11. 电话/微信号</label><input type="text" id="contact"></div>
        <div class="form-group"><label>12. 邮箱</label><input type="text" id="email"></div>

        <div class="form-group"><label>13. 学历</label><input type="text" id="eduLevel"></div>
        <div class="form-group"><label>14. 入学年份</label><input type="text" id="eduInYear"></div>
        <div class="form-group"><label>15. 学校</label><input type="text" id="school"></div>
        <div class="form-group"><label>16. 备注</label><input type="text" id="note"></div>
    </div>

    <div class="actions">
        <button class="btn btn-add" onclick="addRow()">✅ 加入寻访名单</button>
        <button class="btn btn-excel" onclick="exportToExcel()">📊 导出 Excel 表格</button>
        <button class="btn btn-logout" onclick="location.reload()">🔒 退出登录</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>姓名</th><th>状态</th><th>岗位</th><th>性别</th><th>出生年</th><th>现公司</th><th>目前所在地</th><th>电话/微信</th><th>学历</th><th>学校</th><th>备注</th><th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 密码配置
    const USER_CONFIG = { "123456": "db_v2_admin", "flyun888": "db_v2_staff" };
    let activeKey = "";
    let dataList = [];

    function handleLogin() {
        const p = document.getElementById('sysPass').value;
        if (USER_CONFIG[p]) {
            activeKey = USER_CONFIG[p];
            document.getElementById('loginOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('appBody').style.display = 'block';
                loadData();
            }, 500);
        } else {
            document.getElementById('loginError').style.display = 'block';
        }
    }

    function loadData() {
        const s = localStorage.getItem(activeKey);
        if (s) { dataList = JSON.parse(s); renderTable(); }
    }

    function addRow() {
        const row = {
            id: Date.now(),
            recCompany: document.getElementById('recCompany').value,
            recJob: document.getElementById('recJob').value,
            name: document.getElementById('name').value,
            gender: document.getElementById('gender').value,
            status: document.getElementById('status').value,
            birthYear: document.getElementById('birthYear').value,
            jobProduct: document.getElementById('jobProduct').value,
            currLoc: document.getElementById('currLoc').value,
            expLoc: document.getElementById('expLoc').value,
            currCompany: document.getElementById('currCompany').value,
            contact: document.getElementById('contact').value,
            email: document.getElementById('email').value,
            eduLevel: document.getElementById('eduLevel').value,
            eduInYear: document.getElementById('eduInYear').value,
            school: document.getElementById('school').value,
            note: document.getElementById('note').value
        };

        if (!row.name) return alert("请输入候选人姓名");
        dataList.push(row);
        localStorage.setItem(activeKey, JSON.stringify(dataList));
        renderTable();
        alert("录入成功！");
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        dataList.forEach(item => {
            const tr = document.createElement("tr");
            let statusStyle = item.status === "合适" ? "status-fit" : (item.status === "不合适" ? "status-unfit" : "status-contacting");
            tr.innerHTML = `
                <td><strong>${item.name}</strong></td>
                <td><span class="${statusStyle}">${item.status}</span></td>
                <td>${item.recJob}</td>
                <td>${item.gender}</td>
                <td>${item.birthYear}</td>
                <td>${item.currCompany}</td>
                <td>${item.currLoc}</td>
                <td>${item.contact}</td>
                <td>${item.eduLevel}</td>
                <td>${item.school}</td>
                <td>${item.note}</td>
                <td><span class="del-link" onclick="del(${item.id})">删除</span></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function del(id) {
        if(confirm("确定删除该记录吗？")) {
            dataList = dataList.filter(i => i.id !== id);
            localStorage.setItem(activeKey, JSON.stringify(dataList));
            renderTable();
        }
    }

    function exportToExcel() {
        if(dataList.length === 0) return alert("当前无数据可导出");
        const header = ["推荐公司", "推荐岗位名称", "姓名", "性别", "状态", "出生年份", "岗位产品", "目前所在地", "期望所在地", "现公司", "电话/微信号", "邮箱", "学历", "入学年份", "学校", "备注"];
        const rows = dataList.map(i => [
            i.recCompany, i.recJob, i.name, i.gender, i.status, i.birthYear, 
            i.jobProduct, i.currLoc, i.expLoc, i.currCompany, i.contact, 
            i.email, i.eduLevel, i.eduInYear, i.school, i.note
        ]);
        const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "寻访报告");
        XLSX.writeFile(wb, `Flyun人才报表_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
</body>
</html>
