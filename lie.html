<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyun 猎头寻访管理工具</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background-color: #f5f7fa; padding: 20px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #0052cc; border-bottom: 2px solid #0052cc; padding-bottom: 10px; }
        
        /* 表单布局 */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; margin-bottom: 5px; color: #666; font-weight: bold; }
        input, select { padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px; outline: none; }
        input:focus { border-color: #409eff; }

        /* 按钮样式 */
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-add { background-color: #409eff; color: white; }
        .btn-export { background-color: #67c23a; color: white; }
        button:hover { opacity: 0.8; }

        /* 表格样式 */
        .table-container { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ebeef5; padding: 10px; text-align: left; }
        th { background-color: #f8f9fb; color: #909399; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <h2>候选人寻访登记表 (Mapping)</h2>
    
    <div class="form-grid" id="inputForm">
        <div class="form-group"><label>推荐公司</label><input type="text" id="recCompany"></div>
        <div class="form-group"><label>岗位名称</label><input type="text" id="jobName"></div>
        <div class="form-group"><label>姓名</label><input type="text" id="name"></div>
        <div class="form-group">
            <label>性别</label>
            <select id="gender"><option>男</option><option>女</option></select>
        </div>
        <div class="form-group"><label>出生年份</label><input type="number" id="birthYear" placeholder="如1995"></div>
        <div class="form-group"><label>现公司</label><input type="text" id="currCompany"></div>
        <div class="form-group"><label>电话/微信</label><input type="text" id="contact"></div>
        <div class="form-group"><label>邮箱</label><input type="email" id="email"></div>
        <div class="form-group"><label>学校</label><input type="text" id="school"></div>
        <div class="form-group"><label>状态</label><input type="text" id="status" placeholder="已面试/待沟通"></div>
    </div>

    <div class="btn-group">
        <button class="btn-add" onclick="addData()">添加记录</button>
        <button class="btn-export" onclick="exportToExcel()">导出为 Excel 表格</button>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>推荐公司</th><th>岗位名称</th><th>姓名</th><th>性别</th>
                    <th>出生年份</th><th>现公司</th><th>电话/微信</th><th>邮箱</th><th>学校</th><th>状态</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    let mappingData = [];

    function addData() {
        const row = {
            "推荐公司": document.getElementById('recCompany').value,
            "推荐的岗位名称": document.getElementById('jobName').value,
            "姓名": document.getElementById('name').value,
            "性别": document.getElementById('gender').value,
            "出生年份": document.getElementById('birthYear').value,
            "现公司": document.getElementById('currCompany').value,
            "电话/微信号": document.getElementById('contact').value,
            "邮箱": document.getElementById('email').value,
            "学校 ": document.getElementById('school').value,
            "状态": document.getElementById('status').value
        };

        if(!row["姓名"]) { alert("请输入姓名"); return; }

        mappingData.push(row);
        updateTable();
        
        // 清空部分输入框
        document.getElementById('name').value = '';
        document.getElementById('contact').value = '';
    }

    function updateTable() {
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        mappingData.forEach(item => {
            const tr = document.createElement('tr');
            Object.values(item).forEach(text => {
                const td = document.createElement('td');
                td.textContent = text;
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
    }

    function exportToExcel() {
        if(mappingData.length === 0) { alert("没有数据可以导出"); return; }
        
        // 创建工作簿
        const ws = XLSX.utils.json_to_sheet(mappingData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Mapping数据");
        
        // 导出文件
        XLSX.
