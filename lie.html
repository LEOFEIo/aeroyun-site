<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLY YUN - iOS 26 Intelligent Space</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-gray: #F2F2F7;
            --ios-text: #1D1D1F;
            --ios-sub: #86868B;
            --radius-main: 28px;
            --glass-bright: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            background-color: #FBFBFD;
            color: var(--ios-text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- iOS 26 流光背景 --- */
        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            overflow: hidden;
        }
        .ambient-bg::before {
            content: ""; position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle at 20% 30%, rgba(210, 227, 252, 0.4) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(252, 228, 236, 0.4) 0%, transparent 40%);
            filter: blur(100px); animation: drift 30s infinite alternate ease-in-out;
        }
        @keyframes drift { from { transform: rotate(0deg) scale(1); } to { transform: rotate(5deg) scale(1.1); } }

        /* --- 登录层 --- */
        #loginOverlay {
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center;
            z-index: 10000; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(40px) saturate(180%);
            transition: opacity 0.8s ease-in-out;
        }
        .spatial-card {
            background: var(--glass-bright); border: 1px solid var(--glass-border);
            border-radius: 48px; padding: 60px 40px; width: 85%; max-width: 360px;
            text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.03);
        }
        .spatial-card h1 { font-size: 44px; font-weight: 900; margin: 0; letter-spacing: -3px; }
        .spatial-card p { font-size: 14px; color: var(--ios-sub); margin: 12px 0 40px; font-weight: 500; }

        /* --- 通用组件 --- */
        .ios-input {
            width: 100%; padding: 18px; border-radius: 18px; border: 1px solid transparent;
            background: rgba(0,0,0,0.03); font-size: 17px; font-weight: 600;
            text-align: center; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .ios-input:focus { background: #fff; border-color: var(--ios-blue); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }

        .btn-ios {
            background: linear-gradient(180deg, #007AFF 0%, #0056B3 100%);
            color: white; border: none; border-radius: 18px; padding: 16px 20px;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,122,255,0.2);
        }
        .btn-ios:active { transform: scale(0.96); opacity: 0.9; }

        .btn-secondary { background: #E5E5EA; color: var(--ios-text); box-shadow: none; }

        /* --- 主界面布局 --- */
        .app-shell { max-width: 1280px; margin: 0 auto; padding: 40px 20px 140px; display: none; }
        .ios-card {
            background: var(--glass-bright); backdrop-filter: blur(30px);
            border-radius: var(--radius-main); padding: 25px; margin-bottom: 25px;
            border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.015);
        }

        /* 可视化横排看板 */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        @media (max-width: 1024px) { .dashboard { grid-template-columns: 1fr; } }
        .chart-box { height: 260px; display: flex; flex-direction: column; align-items: center; }
        .chart-title { font-size: 13px; font-weight: 700; color: var(--ios-sub); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* 搜索多维排版 */
        .search-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .search-field { display: flex; flex-direction: column; gap: 6px; }
        .search-field label { font-size: 11px; font-weight: 800; color: var(--ios-sub); margin-left: 10px; }
        .search-bar { display: flex; gap: 8px; }
        .search-input-mini { flex: 1; padding: 12px 16px; border-radius: 12px; border: none; background: rgba(0,0,0,0.04); font-size: 14px; outline: none; transition: 0.2s; }
        .search-input-mini:focus { background: #fff; box-shadow: inset 0 0 0 1.5px var(--ios-blue); }

        /* 录入表单网格 */
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 11px; font-weight: 700; color: var(--ios-sub); margin-left: 10px; }
        .field select, .field input { padding: 14px; border-radius: 14px; border: 1px solid #E5E5EA; background: #FFF; font-size: 15px; outline: none; }

        /* 表格样式 */
        .ios-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .ios-table th { text-align: left; padding: 15px; font-size: 12px; color: var(--ios-sub); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .ios-table td { padding: 20px 15px; font-size: 14px; border-bottom: 1px solid rgba(0,0,0,0.03); }
        .calc-tag { display: block; font-size: 11px; color: var(--ios-blue); font-weight: 800; margin-top: 4px; }

        /* 底部 Dock */
        .dock {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px);
            padding: 12px 30px; border-radius: 40px; display: flex; gap: 15px;
            border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.1); z-index: 999;
        }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; }
        .badge-合适 { background: #E8F5E9; color: #2E7D32; }
        .badge-不合适 { background: #FFEBEE; color: #C62828; }
        .badge-正在联系中 { background: #FFF8E1; color: #F57F17; }
    </style>
</head>
<body>

<div class="ambient-bg"></div>

<div id="loginOverlay">
    <div class="spatial-card">
        <h1>FLY YUN</h1>
        <p>Your Private Intelligence Space</p>
        <input type="password" id="sysPass" class="ios-input" placeholder="输入访问密码" onkeydown="if(event.keyCode==13) handleLogin()">
        <button class="btn-ios" style="width: 100%; margin-top: 30px;" onclick="handleLogin()">解锁空间</button>
        <div style="margin-top: 25px; font-size: 12px; color: var(--ios-blue); cursor: pointer; font-weight: 600;" onclick="toggleAdmin()">超级管理中心</div>
    </div>
</div>

<div class="app-shell" id="app">
    <header style="margin-bottom: 45px; padding: 0 10px;">
        <h2 style="font-size: 34px; font-weight: 900; letter-spacing: -2px; margin: 0;">FLY YUN</h2>
        <div id="userDisplay" style="color: var(--ios-sub); font-weight: 600; font-size: 13px; margin-top: 6px;"></div>
    </header>

    <div class="dashboard">
        <div class="ios-card chart-box">
            <span class="chart-title">寻访状态</span>
            <div style="width:100%; height:180px;"><canvas id="chartStatus"></canvas></div>
        </div>
        <div class="ios-card chart-box">
            <span class="chart-title">学历画像</span>
            <div style="width:100%; height:180px;"><canvas id="chartEdu"></canvas></div>
        </div>
        <div class="ios-card chart-box">
            <span class="chart-title">项目分布</span>
            <div style="width:100%; height:180px;"><canvas id="chartJob"></canvas></div>
        </div>
    </div>

    <div class="ios-card">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
            <div class="field">
                <label>🏢 添加客户公司</label>
                <div class="search-bar">
                    <input type="text" id="newComp" class="search-input-mini" style="background:#F2F2F7; height:44px;" placeholder="公司名">
                    <button class="btn-ios" style="padding:0 20px; height:44px;" onclick="addComp()">添加</button>
                </div>
            </div>
            <div class="field">
                <label>💼 为客户添加岗位</label>
                <div class="search-bar">
                    <select id="compSelect" class="search-input-mini" style="background:#F2F2F7; height:44px;"><option value="">选择公司</option></select>
                    <input type="text" id="newJob" class="search-input-mini" style="background:#F2F2F7; height:44px;" placeholder="岗位名">
                    <button class="btn-ios" style="padding:0 20px; height:44px;" onclick="addJob()">添加</button>
                </div>
            </div>
        </div>
        <div id="treeDisplay" style="margin-top:20px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
    </div>

    <div class="ios-card">
        <div style="font-weight: 800; margin-bottom: 20px; font-size: 15px;">📝 录入新候选人</div>
        <div class="form-grid">
            <div class="field"><label>所属客户</label><select id="f1" onchange="filterJobs()"></select></div>
            <div class="field"><label>所属岗位</label><select id="f2"></select></div>
            <div class="field"><label>姓名</label><input type="text" id="f3"></div>
            <div class="field"><label>性别</label><select id="f4"><option>男</option><option>女</option></select></div>
            <div class="field"><label>状态</label><select id="f5"><option>正在联系中</option><option>合适</option><option>不合适</option></select></div>
            <div class="field"><label>出生年份</label><select id="f6"></select></div>
            <div class="field"><label>所在地</label><input type="text" id="f8"></div>
            <div class="field"><label>现公司</label><input type="text" id="f10"></div>
            <div class="field"><label>手机/微信</label><input type="text" id="f11"></div>
            <div class="field"><label>学历</label><select id="f13"><option>大专</option><option>本科</option><option>研究生</option><option>博士</option></select></div>
            <div class="field"><label>入学年份</label><select id="f14"></select></div>
            <div class="field"><label>备注</label><input type="text" id="f16"></div>
        </div>
    </div>

    <div class="ios-card" style="padding: 0; overflow: hidden;">
        <div style="padding: 25px 25px 0;">
            <div style="font-weight: 800; margin-bottom: 15px;">🔍 智能筛选</div>
            <div class="search-row">
                <div class="search-field"><label>人选</label><div class="search-bar"><input type="text" id="sName" class="search-input-mini" placeholder="姓名关键词"><button class="btn-ios btn-secondary" onclick="doSearch()">搜</button></div></div>
                <div class="search-field"><label>客户</label><div class="search-bar"><input type="text" id="sComp" class="search-input-mini" placeholder="公司名"><button class="btn-ios btn-secondary" onclick="doSearch()">搜</button></div></div>
                <div class="search-field"><label>岗位</label><div class="search-bar"><input type="text" id="sJob" class="search-input-mini" placeholder="职位名"><button class="btn-ios btn-secondary" onclick="doSearch()">搜</button></div></div>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table class="ios-table">
                <thead><tr><th>姓名</th><th>状态</th><th>客户 / 岗位</th><th>年龄</th><th>资历</th><th>联系方式</th><th>管理</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="dock" id="userDock" style="display:none">
    <button class="btn-ios" style="padding:12px 30px" onclick="saveData()">✅ 存入名单</button>
    <button class="btn-ios btn-secondary" style="background:#34C759; color:#fff" onclick="exportXLS()">📊 导出 Excel</button>
    <button class="btn-ios btn-secondary" onclick="location.reload()">🔒 退出</button>
</div>

<script>
    let dbKey = ""; let data = []; let tree = {}; let charts = {};
    const curY = new Date().getFullYear();
    const MASTER_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"; 
    let isAdmin = false;

    async function hash(s) {
        const u = new TextEncoder().encode(s);
        const b = await crypto.subtle.digest('SHA-256', u);
        return Array.from(new Uint8Array(b)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function toggleAdmin() {
        isAdmin = !isAdmin;
        document.getElementById('mainTitle').innerText = isAdmin ? "ADMIN" : "FLY YUN";
        document.getElementById('mainTitle').style.color = isAdmin ? "#AF52DE" : "#1D1D1F";
    }

    async function handleLogin() {
        const p = document.getElementById('sysPass').value;
        if(!p) return;
        if(isAdmin) {
            if(await hash(p) === MASTER_HASH) { alert("后台已激活，目前显示全局管理逻辑..."); } else alert("指纹不匹配");
        } else {
            dbKey = "FLY_L_V15_" + btoa(p);
            document.getElementById('loginOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loginOverlay').style.display='none';
                document.getElementById('app').style.display='block';
                document.getElementById('userDock').style.display='flex';
                document.getElementById('userDisplay').innerText = "Security Key: " + p;
                initApp();
            }, 500);
        }
    }

    function initApp() {
        let y = ''; for(let i=1960; i<=2022; i++) y += `<option value="${i}">${i}</option>`;
        document.getElementById('f6').innerHTML = '<option value="">出生年</option>' + y;
        let iy = ''; for(let i=1900; i<=2024; i++) iy += `<option value="${i}">${i}</option>`;
        document.getElementById('f14').innerHTML = '<option value="">入学年</option>' + iy;
        data = JSON.parse(localStorage.getItem(dbKey) || "[]");
        tree = JSON.parse(localStorage.getItem(dbKey+"_t") || "{}");
        refreshMgmt(); render(); updateCharts();
    }

    function addComp() { const v = document.getElementById('newComp').value.trim(); if(v && !tree[v]) { tree[v] = []; saveT(); document.getElementById('newComp').value = ""; refreshMgmt(); } }
    function addJob() { const c = document.getElementById('compSelect').value; const j = document.getElementById('newJob').value.trim(); if(c && j && !tree[c].includes(j)) { tree[c].push(j); saveT(); document.getElementById('newJob').value = ""; refreshMgmt(); } }
    function saveT() { localStorage.setItem(dbKey+"_t", JSON.stringify(tree)); }
    function refreshMgmt() {
        document.getElementById('treeDisplay').innerHTML = Object.keys(tree).map(c => `<span class="badge" style="background:rgba(0,0,0,0.05); color:#000; border-radius:12px;">${c} (${tree[c].length})</span>`).join('');
        const opt = '<option value="">-- 选择客户 --</option>' + Object.keys(tree).map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('compSelect').innerHTML = opt; document.getElementById('f1').innerHTML = opt;
    }
    function filterJobs() { const c = document.getElementById('f1').value; document.getElementById('f2').innerHTML = (c && tree[c]) ? '<option value="">-- 选择岗位 --</option>' + tree[c].map(j => `<option value="${j}">${j}</option>`).join('') : '<option value="">先选客户</option>'; }

    function doSearch() { render(); }
    function saveData() { 
        const r = { id: Date.now() }; for(let i=1; i<=16; i++) { let el=document.getElementById('f'+i); if(el) r['f'+i] = el.value; }
        if(!r.f3) return alert("姓名必填");
        data.push(r); localStorage.setItem(dbKey, JSON.stringify(data)); render(); updateCharts();
    }

    function render() {
        const n = document.getElementById('sName').value.toLowerCase();
        const f = data.filter(i => i.f3.toLowerCase().includes(n));
        document.getElementById('tableBody').innerHTML = f.map(i => {
            const age = i.f6 ? (curY - parseInt(i.f6)) : "-";
            const exp = i.f14 ? (curY - parseInt(i.f14)) : "-";
            return `<tr><td><b>${i.f3}</b></td><td><span class="badge badge-${i.f5}">${i.f5}</span></td><td><b>${i.f1||"-"}</b><br><small>${i.f2||"-"}</small></td><td>${age}岁<span class="calc-tag">${i.f6||"-"}</span></td><td>资历${exp}年<span class="calc-tag">${i.f13||"-"}</span></td><td>${i.f11||"-"}</td><td><button style="color:red; border:none; background:none; cursor:pointer" onclick="del(${i.id})">移除</button></td></tr>`;
        }).join('');
    }

    function del(id) { if(confirm("确定移除？")) { data = data.filter(x => x.id !== id); localStorage.setItem(dbKey, JSON.stringify(data)); render(); updateCharts(); } }

    function updateCharts() {
        if(data.length===0) return;
        const s = {'合适':0,'不合适':0,'正在联系中':0}, e = {'大专':0,'本科':0,'研究生':0,'博士':0}, jb = {};
        data.forEach(i => { s[i.f5]++; e[i.f13]++; jb[i.f1||"未分类"] = (jb[i.f1||"未分类"] || 0) + 1; });
        draw('chartStatus', 'doughnut', Object.keys(s), Object.values(s), ['#34C759','#FF3B30','#FF9500'], true);
        draw('chartEdu', 'bar', Object.keys(e), Object.values(e), '#007AFF', false);
        draw('chartJob', 'bar', Object.keys(jb), Object.values(jb), '#AF52DE', false);
    }
    function draw(id, type, labels, data, colors, isD) {
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type: type, data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 10 }] },
            options: { maintainAspectRatio:false, cutout: isD?'80%':0, plugins:{ legend:{ display:isD, position:'bottom', labels:{boxWidth:8, font:{size:10}}} }, scales:{ y:{ display:!isD, beginAtZero:true}, x:{display:!isD}} }
        });
    }
</script>
</body>
</html>
